{{define "library-content.html"}}
<div id="library-content">
<nav class="breadcrumbs">
    <a class="breadcrumb-item {{if not .Breadcrumbs}}active{{end}}"
       hx-get="/library"
       hx-target="#library-content"
       hx-swap="innerHTML"
       hx-push-url="/library"
       href="/library">
       <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    
    {{$total := len .Breadcrumbs}}
    {{range $i, $crumb := .Breadcrumbs}}
      <span class="breadcrumb-sep">›</span>
      <a class="breadcrumb-item {{if eq (add $i 1) $total}}active{{end}}"
         hx-get="/library/{{pathEsc $crumb.Path}}"
         hx-target="#library-content"
         hx-swap="innerHTML"
         hx-push-url="/library/{{pathEsc $crumb.Path}}"
         href="/library/{{pathEsc $crumb.Path}}">{{$crumb.Name}}</a>
    {{end}}
  </nav>

  <div class="entry-list">
    {{range .Listing.Entries}}
      {{if .IsDir}}
      <a class="entry-item"
         hx-get="/library/{{pathEsc .Path}}"
         hx-target="#library-content"
         hx-swap="outerHTML"
         hx-push-url="/library/{{pathEsc .Path}}"
         href="/library/{{pathEsc .Path}}">
        <div class="entry-icon">📁</div>
        <div class="entry-info">
          <div class="entry-name">{{.Name}}</div>
          <div class="entry-sub">Directory</div>
        </div>
      </a>
      {{else}}
      <div class="entry-item">
        <div class="entry-icon">♪</div>
        <div class="entry-info">
          <div class="entry-name">{{.Name}}</div>
        </div>
        <button class="btn btn-primary"
                style="padding: 4px 10px; font-size: 0.75rem;"
                hx-post="/queue/add"
                hx-vals='{"path": "{{.Path}}"}'
                {{if $.QueueTarget}}hx-target="{{$.QueueTarget}}" hx-swap="outerHTML"{{else}}hx-swap="none"{{end}}>+ Queue</button>
      </div>
      {{end}}
    {{end}}
  </div>
</div>
{{end}}
